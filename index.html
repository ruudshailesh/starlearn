<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⭐ StarLearn – Vivan & Hridaan v2</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --vivan: #3b82f6;
  --vivan2: #8b5cf6;
  --hridaan: #f59e0b;
  --hridaan2: #ef4444;
  --parent: #059669;
  --parent2: #0891b2;
}

body {
  font-family: 'Nunito', sans-serif;
  background: #f0f9ff;
  min-height: 100vh;
  padding: 0;
  overflow-x: hidden;
}

/* ── SCREENS ── */
.screen { display: none; min-height: 100vh; }
.screen.active { display: flex; flex-direction: column; }

/* ════════════════════════════
   LOGIN SCREEN
════════════════════════════ */
#login-screen {
  background: linear-gradient(135deg, #e0f2fe, #f0fdf4);
  justify-content: center;
  align-items: center;
  padding: 20px;
}

.login-card {
  background: white;
  width: 100%;
  max-width: 400px;
  border-radius: 24px;
  padding: 30px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.05);
  text-align: center;
}

.login-card h1 {
  font-family: 'Baloo 2', cursive;
  font-size: 2.5rem;
  font-weight: 800;
  color: #1e293b;
  margin-bottom: 8px;
}

.login-card p {
  color: #64748b;
  margin-bottom: 24px;
}

.input-group {
  text-align: left;
  margin-bottom: 16px;
}

.input-group label {
  display: block;
  font-weight: 700;
  color: #475569;
  margin-bottom: 6px;
  font-size: 0.95rem;
}

.input-group input {
  width: 100%;
  padding: 12px 16px;
  border: 2px solid #e2e8f0;
  border-radius: 12px;
  font-family: inherit;
  font-size: 1rem;
  transition: border-color 0.2s;
}

.input-group input:focus {
  outline: none;
  border-color: #3b82f6;
}

.login-btn {
  width: 100%;
  background: linear-gradient(135deg, #3b82f6, #2563eb);
  color: white;
  border: none;
  border-radius: 12px;
  padding: 14px;
  font-size: 1rem;
  font-weight: 700;
  cursor: pointer;
  transition: transform 0.2s;
}

.login-btn:hover {
  transform: translateY(-2px);
}

.spell-box {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 15px;
  margin-bottom: 20px;
}

.spell-input {
  width: 100%;
  max-width: 300px;
  padding: 12px;
  border: 2px solid #e2e8f0;
  border-radius: 12px;
  font-size: 1.2rem;
  text-align: center;
}

.spell-check-btn {
  background: #059669;
  color: white;
  border: none;
  border-radius: 12px;
  padding: 12px 24px;
  font-size: 1rem;
  font-weight: 700;
  cursor: pointer;
}

.spell-feedback {
  font-size: 1.1rem;
  font-weight: 700;
  min-height: 1.5rem;
}
</style>
</head>
<body>

  <div id="login-screen" class="screen active">
    <div class="login-card">
      <h1>StarLearn</h1>
      <p>Welcome! Please log in.</p>
      
      <div class="input-group">
        <label>Username</label>
        <input type="text" id="login-username" placeholder="Enter your name" onkeydown="if(event.key === 'Enter') doLogin()">
      </div>
      
      <button class="login-btn" onclick="doLogin()">Login</button>
    </div>
  </div>

  <div id="spelling-screen" class="screen">
    <div style="padding: 20px; text-align: center;">
      <h2 style="font-family: 'Baloo 2', cursive; margin-bottom: 20px;">Spelling Practice</h2>
      
      <div class="spell-box">
        <p id="word-prompt">Type the word you hear:</p>
        <input type="text" id="spell-input" class="spell-input" placeholder="Type here..." onkeydown="if(event.key === 'Enter') checkSpelling()">
        <button class="spell-check-btn" onclick="checkSpelling()">✅ Check</button>
        <div class="spell-feedback" id="spell-feedback"></div>
      </div>

      <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;padding-bottom:10px;">
        <button id="spell-next-btn" onclick="spellNext()" style="display:none;background:linear-gradient(135deg,#7c3aed,#db2877);color:white;border:none;border-radius:14px;padding:12px 28px;font-family:'Baloo 2',cursive;font-size:1rem;font-weight:800;cursor:pointer;">Next Word ➡️</button>
        <button onclick="goHome()" style="background:#f3f4f6;border:2px solid #e5e7eb;border-radius:14px;padding:12px 24px;font-family:'Baloo 2',cursive;font-size:1rem;font-weight:700;cursor:pointer;color:#374151;">🏠 Home</button>
      </div>

      <div id="spell-results-card" style="display:none;background:white;border-radius:20px;padding:24px;text-align:center;box-shadow:0 4px 20px rgba(0,0,0,0.09);">
        <div style="font-size:2rem; margin-bottom: 10px;">🎉 Great Job! 🎉</div>
        <p id="spell-final-score"></p>
      </div>
    </div>
  </div>

  <script>
    /*
      Author: StarLearn Developer
      Purpose: Handles interactive state transitions, authentication simulation, and spelling quiz control flows.
      Documentation: 
      - doLogin: Checks login input and proceeds to the game screens.
      - checkSpelling: Evaluates user spelling input.
      - spellNext: Cycles to the next word in the list.
      - goHome: Navigates the UI back to the home or initial screen states.
    */

    let currentWord = "apple";
    let score = 0;

    // Handle Login functionality
    function doLogin() {
      const usernameInput = document.getElementById('login-username').value.trim();
      
      if (usernameInput === "") {
        alert("Please enter a username to continue.");
        return;
      }
      
      // Transition to spelling game screen
      document.getElementById('login-screen').classList.remove('active');
      document.getElementById('spelling-screen').classList.add('active');
    }

    // Check spelling response
    function checkSpelling() {
      const inputField = document.getElementById('spell-input');
      const feedback = document.getElementById('spell-feedback');
      const nextBtn = document.getElementById('spell-next-btn');
      const userWord = inputField.value.trim().toLowerCase();

      if (userWord === currentWord) {
        feedback.style.color = "#059669";
        feedback.textContent = "Correct! Well done!";
        score++;
        nextBtn.style.display = "inline-block";
      } else {
        feedback.style.color = "#ef4444";
        feedback.textContent = "Try again!";
      }
    }

    // Move to next word or show results
    function spellNext() {
      const feedback = document.getElementById('spell-feedback');
      const nextBtn = document.getElementById('spell-next-btn');
      const inputField = document.getElementById('spell-input');
      const resultsCard = document.getElementById('spell-results-card');
      const finalScore = document.getElementById('spell-final-score');

      // Reset for final score display
      inputField.value = "";
      feedback.textContent = "";
      nextBtn.style.display = "none";

      // Show results
      resultsCard.style.display = "block";
      finalScore.textContent = `You scored ${score} points!`;
    }

    // Reset and go back to login
    function goHome() {
      score = 0;
      document.getElementById('spell-input').value = "";
      document.getElementById('spell-feedback').textContent = "";
      document.getElementById('spell-next-btn').style.display = "none";
      document.getElementById('spell-results-card').style.display = "none";

      document.getElementById('spelling-screen').classList.remove('active');
      document.getElementById('login-screen').classList.add('active');
    }
  </script>

</body>
</html>
